name: Smoke

on:
  push:
  pull_request:

jobs:
  three-u-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run 3U smoke test
        run: python scripts/run_3u_reproduction.py --only smoke --output-dir /tmp/three-u-smoke
